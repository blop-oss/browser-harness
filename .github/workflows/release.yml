name: Release @blopai/browser-harness

# Publishes @blopai/browser-harness to npm when a tag like `harness-v0.1.0`
# is pushed. Uses npm trusted publishing (OIDC) — no long-lived tokens needed.
#
# Setup required once on npmjs.com:
#   1. Go to your package Settings → Trusted Publishing.
#   2. Select GitHub Actions and fill in:
#      - Organization or user: blop-oss
#      - Repository: browser-harness
#      - Workflow filename: release.yml
#      - Allowed actions: npm publish
#   3. (Recommended) Set Publishing access to
#      "Require two-factor authentication and disallow tokens".
#
# Cut a release:
#   1. Bump the version in package.json.
#   2. Commit, then tag: `git tag harness-v0.1.0 && git push origin harness-v0.1.0`.
# The workflow verifies the tag matches package.json before publishing.
# Provenance attestations are generated automatically by trusted publishing.
#
# @blopai/browser-harness must be published before a @blopai/cli release that
# depends on it, since the CLI consumes it via `file:` (resolved to a real
# version on publish).

on:
  push:
    tags:
      - "harness-v*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: npm-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    uses: ./.github/workflows/ci.yml

  release:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Install trusted-publishing-compatible npm
        run: npm install --global npm@11.5.1

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#harness-v}"
          echo "package.json: $PKG_VERSION"
          echo "git tag:      $TAG_VERSION"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Build
        run: bun run build

      - name: Verify npm package
        run: npm pack --dry-run

      - name: Publish to npm (trusted publishing / OIDC)
        run: npm publish --access public
        # No NODE_AUTH_TOKEN — npm CLI auto-detects the OIDC environment
        # and exchanges the GitHub Actions ID token for a short-lived
        # publish token. Provenance is generated automatically.

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "@blopai/browser-harness ${{ github.ref_name }}"
          generate_release_notes: true
